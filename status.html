<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Status — Firebase Raw</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
  body{background:#060609;color:#f0f0f5;font-family:'Fira Code',monospace;padding:24px;margin:0}
  h1{font-size:14px;color:rgba(255,255,255,.4);margin-bottom:8px;font-family:sans-serif}
  .status{font-size:11px;margin-bottom:16px;padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.1)}
  pre{white-space:pre-wrap;word-break:break-all;font-size:12px;line-height:1.6}
  .err{color:#f87171}.ok{color:#4ade80}.warn{color:#fb923c}
  .info{font-size:11px;color:rgba(255,255,255,.35);margin-top:12px;border-top:1px solid rgba(255,255,255,.07);padding-top:12px}
</style>
</head>
<body>
<h1>Firebase · dashboards/main · raw JSON</h1>
<div class="status" id="auth-status">Auth : vérification...</div>
<pre id="out">Chargement...</pre>
<div class="info" id="info"></div>
<script>
  const out = document.getElementById('out');
  const authEl = document.getElementById('auth-status');
  const infoEl = document.getElementById('info');
  const cfg = JSON.parse(localStorage.getItem('jtb3_fb') || 'null');

  if (!cfg || !cfg.apiKey || !cfg.databaseURL) {
    authEl.className = 'status err';
    authEl.textContent = 'Aucune config Firebase dans localStorage (jtb3_fb)';
    out.className = 'err';
    out.textContent = '→ Ouvre le dashboard principal, va dans Config et colle ta config Firebase.';
  } else {
    if (!firebase.apps.length) firebase.initializeApp(cfg);

    infoEl.textContent = 'Domaine actuel : ' + location.hostname
      + '\n→ Vérifie que ce domaine est bien dans Firebase Console > Authentication > Authorized domains';

    firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL)
      .then(() => firebase.auth().signInAnonymously())
      .then(cred => {
        authEl.className = 'status ok';
        authEl.textContent = 'Auth ✓ — UID anonyme : ' + cred.user.uid;
        return firebase.database().ref('dashboards/main').once('value');
      })
      .then(snap => {
        const data = snap.val();
        out.className = data ? 'ok' : 'warn';
        out.textContent = data
          ? JSON.stringify(data, null, 2)
          : 'Aucune donnée à dashboards/main (Firebase vide ou règles DB refusent la lecture).';
      })
      .catch(e => {
        if (e.code === 'auth/operation-not-allowed') {
          // Auth anonyme non activée → essai direct sans auth
          authEl.className = 'status warn';
          authEl.textContent = 'Auth anonyme non activée → lecture DB sans auth';
          firebase.database().ref('dashboards/main').once('value').then(snap => {
            const data = snap.val();
            out.className = data ? 'ok' : 'warn';
            out.textContent = data ? JSON.stringify(data, null, 2) : 'Aucune donnée (DB vide ou règles refusent).';
          }).catch(e2 => {
            out.className = 'err';
            out.textContent = 'Erreur DB : ' + e2.message
              + '\n\nSi "permission_denied" → tes règles DB exigent auth != null.\nActive l\'auth anonyme dans Firebase Console > Authentication > Sign-in method.';
          });
        } else {
          authEl.className = 'status err';
          authEl.textContent = 'Erreur auth : ' + e.message;
          out.className = 'err';
          out.textContent = e.message;
        }
      });
  }
</script>
</body>
</html>
